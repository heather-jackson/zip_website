<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Zip Analytics</title>
  <link rel="icon" type="image/png" href="ZA.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #fffefa;
      --orange:      #f17223;
      --orange-dark: #d9621d;
      --text:        #1c1c2e;
      --text-mid:    #4a4a6a;
      --text-muted:  #888;
      --white:       #ffffff;
      --card-border: rgba(241, 114, 35, 0.13);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      font-family: 'Open Sans', sans-serif;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Navigation ──────────────────────────────────────── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      padding: 0.75rem 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 254, 250, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo img { height: 80px; width: auto; }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }

    .nav-links a {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 0.88rem;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--orange); }
    .nav-links a.active { color: var(--orange); }

    /* ── Page Hero ───────────────────────────────────────── */
    .page-hero {
      padding: 9rem 6% 3.5rem;
      border-bottom: 1px solid var(--card-border);
    }

    .page-eyebrow {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.9rem;
    }

    .page-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3.25rem);
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .page-intro {
      font-size: 1.05rem;
      color: var(--text-mid);
      line-height: 1.75;
      max-width: 560px;
    }

    /* ── Contact section ─────────────────────────────────── */
    .contact-section {
      padding: 10rem 6%;
    }

    .contact-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .section-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.9rem;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 4vw, 2.75rem);
      color: var(--text);
      line-height: 1.12;
      margin-bottom: 1.1rem;
    }

    .section-body {
      font-size: 1.03rem;
      color: var(--text-mid);
      max-width: 580px;
      line-height: 1.75;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.5rem;
      background: var(--white);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      text-decoration: none;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .contact-card:hover {
      box-shadow: 0 8px 28px rgba(241,114,35,0.1);
      transform: translateY(-2px);
    }

    .contact-icon {
      width: 46px;
      height: 46px;
      background: rgba(241,114,35,0.09);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--orange);
    }

    .contact-card-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    .contact-card-value {
      font-family: 'Open Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--orange);
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      padding: 2.25rem 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      border-top: 1px solid var(--card-border);
    }

    .footer-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .footer-logo img { height: 100px; width: auto; }

    .footer-copy { font-size: 0.83rem; color: var(--text-muted); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 960px) {
      .contact-inner { grid-template-columns: 1fr; gap: 3rem; }
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .nav-logo img { height: 48px; }
      .page-hero { padding: 6rem 5% 2.5rem; }
      .contact-section { padding: 3rem 5%; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo"><img src="Zip Logo Transparent.png" alt="Zip Analytics" /></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="case-studies.html">Case Studies</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>



  <!-- Contact -->
  <section class="contact-section">
    <div class="contact-inner">
      <div class="contact-text">
        <p class="section-label">Let's work together</p>
        <h2 class="section-title">Get in Touch</h2>
        <p class="section-body">Interested in working with us? Reach out via email or connect with us on LinkedIn.</p>
      </div>
      <div class="contact-links">
        <a href="mailto:hello@zipanalytics.co.uk" class="contact-card">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polyline points="2,4 12,13 22,4"/>
            </svg>
          </div>
          <div>
            <p class="contact-card-label">Email</p>
            <p class="contact-card-value">hello@zipanalytics.co.uk</p>
          </div>
        </a>
        <a href="https://www.linkedin.com/company/zipanalytics/" target="_blank" rel="noopener noreferrer" class="contact-card">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
              <rect x="2" y="9" width="4" height="12"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          </div>
          <div>
            <p class="contact-card-label">LinkedIn</p>
            <p class="contact-card-value">Zip Analytics</p>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <a href="index.html" class="footer-logo"><img src="Zip Logo no Catch Line Transparent.png" alt="Zip Analytics" /></a>
    <p class="footer-copy">© 2026 Zip Analytics. All rights reserved.</p>
  </footer>

</body>
</html>
